<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AssetFlow | 분석 보고서</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --bg-main: #0E1117;
      --bg-sidebar: #121722;
      --bg-card: #171C26;
      --bg-card-secondary: #141923;
      --border-card: #282F3B;
      --text-primary: #F3F4F6;
      --text-secondary: #9CA3AF;
      --text-disabled: #667085;
      --accent: #6C8CFF;
      --positive: #E57373;
      --negative: #5B8DEF;
      --warning: #F2B84B;
      --neutral: #6B7280;
      --radius-card: 16px;
      --sidebar-width: 240px;
      --gap-card: 24px;
      --global-stock-soft: rgba(77, 141, 255, 0.16);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-width: 1200px;
      margin: 0;
      background: var(--bg-main);
      color: var(--text-primary);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button { font: inherit; color: inherit; }
    button:not(:disabled) { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .num { font-variant-numeric: tabular-nums; }

    .app { display: flex; min-height: 100vh; }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-width);
      min-height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-card);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      z-index: 5;
    }

    .main {
      width: calc(100% - var(--sidebar-width));
      margin-left: var(--sidebar-width);
      padding: 30px 40px 56px;
    }

    .content {
      max-width: 1580px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 34px;
      padding: 0 6px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 850;
    }

    .brand-name { font-size: 17px; font-weight: 800; }

    .nav { display: grid; gap: 6px; }

    .nav-item {
      min-height: 44px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      padding: 0 12px;
      font-weight: 650;
      text-align: left;
      text-decoration: none;
    }

    .nav-item.active {
      color: #fff;
      background: #202838;
    }

    .nav-item.disabled { color: var(--text-disabled); }
    .nav-spacer { flex: 1; }

    .icon {
      width: 18px;
      height: 18px;
      flex: none;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #222A38;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .pill.ready {
      background: rgba(156, 163, 175, 0.12);
      color: #A7B0BE;
      border: 1px solid #313947;
      margin-left: auto;
    }

    .user-panel {
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      gap: 12px;
      padding: 14px 10px 0;
      border-top: 1px solid var(--border-card);
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #263040;
      color: #E5E7EB;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .user-name { margin: 0; font-weight: 750; }
    .user-desc { margin: 3px 0 0; color: var(--text-secondary); font-size: 12px; }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 20px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 850;
    }

    .page-desc {
      margin: 9px 0 0;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 760px;
    }

    .page-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 22px;
    }

    .asset-nav-card {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 16px 18px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .asset-nav-card::before,
    .asset-nav-card::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 34px;
      pointer-events: none;
      z-index: 1;
    }

    .asset-nav-card::before {
      left: 0;
      background: linear-gradient(90deg, var(--bg-card), rgba(23, 28, 38, 0));
    }

    .asset-nav-card::after {
      right: 0;
      background: linear-gradient(270deg, var(--bg-card), rgba(23, 28, 38, 0));
    }

    .asset-nav-scroll {
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: #3B4556 transparent;
      padding: 2px 20px;
    }

    .asset-nav-scroll::-webkit-scrollbar { height: 6px; }
    .asset-nav-scroll::-webkit-scrollbar-thumb { background: #3B4556; border-radius: 999px; }

    .asset-nav-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: max-content;
    }

    .asset-nav-label {
      margin-right: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .asset-tab {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 0 13px;
      background: var(--bg-card-secondary);
      color: var(--text-secondary);
      font-weight: 750;
      white-space: nowrap;
    }

    .asset-tab.active {
      border-color: rgba(77, 141, 255, 0.55);
      background: var(--global-stock-soft);
      color: #DCE7FF;
    }

    .asset-tab.disabled {
      cursor: not-allowed;
      color: var(--text-disabled);
      background: rgba(20, 25, 35, 0.65);
      border-color: rgba(40, 47, 59, 0.7);
    }

    .report-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 24px;
      align-items: start;
    }

    .report-main {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .toc-card {
      position: sticky;
      top: 92px;
      display: grid;
      gap: 14px;
      max-height: calc(100vh - 116px);
      overflow: auto;
    }

    .toc-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .toc-list {
      display: grid;
      gap: 5px;
    }

    .toc-link {
      display: block;
      padding: 8px 9px;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.35;
      border: 1px solid transparent;
    }

    .toc-link.active {
      color: #DCE7FF;
      background: rgba(77, 141, 255, 0.13);
      border-color: rgba(77, 141, 255, 0.28);
    }

    .top-link {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      background: #222A38;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 750;
    }

    .report-section {
      scroll-margin-top: 110px;
      display: grid;
      gap: 16px;
    }

    .report-section h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 850;
    }

    .report-section h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 800;
    }

    .report-copy {
      margin: 0;
      color: #D1D5DB;
      font-size: 14px;
      line-height: 1.75;
      word-break: keep-all;
    }

    .report-copy.muted { color: var(--text-secondary); }

    .hero-card {
      display: grid;
      gap: 18px;
      border-color: rgba(108, 140, 255, 0.36);
      background: linear-gradient(135deg, rgba(108, 140, 255, 0.12), rgba(23, 28, 38, 0.98) 42%);
    }

    .hero-card h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 900;
    }

    .hero-subtitle {
      margin: 0;
      color: #D1D5DB;
      font-size: 15px;
      line-height: 1.65;
      max-width: 920px;
      word-break: keep-all;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-box {
      display: grid;
      gap: 6px;
      min-width: 0;
      padding: 14px;
      border-radius: 14px;
      background: rgba(20, 25, 35, 0.82);
      border: 1px solid #263040;
    }

    .metric-box span {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
    }

    .metric-box strong {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 850;
      white-space: nowrap;
    }

    .notice-card {
      border-color: rgba(242, 184, 75, 0.28);
      background: rgba(242, 184, 75, 0.06);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .mini-grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .info-box {
      display: grid;
      gap: 8px;
      padding: 15px;
      border-radius: 14px;
      background: var(--bg-card-secondary);
      border: 1px solid #263040;
      min-width: 0;
    }

    .info-box strong {
      font-size: 16px;
      font-weight: 850;
      line-height: 1.35;
    }

    .info-box p {
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.55;
      word-break: keep-all;
    }

    .direction-tag {
      width: max-content;
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 750;
    }

    .direction-tag.support { color: #E8F1FF; background: rgba(77, 141, 255, 0.14); }
    .direction-tag.pressure { color: #FFE1E1; background: rgba(229, 115, 115, 0.13); }
    .direction-tag.mixed { color: #FFEBC2; background: rgba(242, 184, 75, 0.13); }

    .source-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 22px;
      margin-left: 4px;
      border-radius: 999px;
      border: 1px solid rgba(108, 140, 255, 0.34);
      color: #CFE0FF;
      background: rgba(108, 140, 255, 0.12);
      font-size: 11px;
      font-weight: 850;
      vertical-align: 1px;
    }

    .evidence-note {
      display: inline-flex;
      align-items: center;
      width: max-content;
      min-height: 24px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(156, 163, 175, 0.1);
      color: #A7B0BE;
      font-size: 12px;
      font-weight: 750;
    }

    .reason-card {
      display: grid;
      gap: 12px;
      min-width: 0;
      padding: 16px;
      border-radius: 14px;
      background: var(--bg-card-secondary);
      border: 1px solid #263040;
    }

    .reason-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .reason-head strong {
      font-size: 16px;
      line-height: 1.35;
    }

    .reason-label {
      flex: none;
      min-height: 24px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(108, 140, 255, 0.13);
      color: #DCE7FF;
      font-size: 12px;
      font-weight: 850;
    }

    .reason-card p {
      margin: 0;
      color: #D1D5DB;
      line-height: 1.65;
      word-break: keep-all;
    }

    .reason-detail {
      display: grid;
      gap: 7px;
      padding-top: 10px;
      border-top: 1px solid var(--border-card);
    }

    .reason-detail span {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
    }

    .asset-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .asset-tags em {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(34, 42, 56, 0.85);
      color: #D1D5DB;
      font-style: normal;
      font-size: 12px;
      font-weight: 700;
    }

    .index-card {
      display: grid;
      gap: 8px;
      min-height: 112px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(20, 25, 35, 0.82);
      border: 1px solid #263040;
      color: var(--text-primary);
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .index-card:hover {
      border-color: rgba(108, 140, 255, 0.44);
      background: rgba(32, 40, 56, 0.78);
    }

    .index-card span {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 750;
    }

    .index-card strong {
      font-size: 16px;
      line-height: 1.35;
    }

    .index-card small {
      color: var(--text-disabled);
      line-height: 1.45;
    }

    .variable-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .variable-card {
      display: grid;
      gap: 13px;
      min-width: 0;
      padding: 16px;
      border-radius: 14px;
      background: var(--bg-card-secondary);
      border: 1px solid #263040;
    }

    .variable-card header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .variable-card h3 {
      font-size: 16px;
    }

    .variable-meta {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .value-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .value-box {
      display: grid;
      gap: 4px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(14, 17, 23, 0.35);
      border: 1px solid rgba(40, 47, 59, 0.72);
    }

    .value-box span {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 750;
    }

    .value-box strong {
      font-size: 14px;
      line-height: 1.25;
    }

    .mini-chart {
      position: relative;
      height: 118px;
      border-radius: 14px;
      border: 1px solid rgba(40, 47, 59, 0.86);
      background:
        linear-gradient(rgba(40, 47, 59, 0.45) 1px, transparent 1px) 0 25% / 100% 25%,
        rgba(14, 17, 23, 0.32);
      overflow: hidden;
    }

    .chart-segment,
    .chart-dot {
      position: absolute;
      background: var(--accent);
    }

    .chart-segment {
      height: 2px;
      transform-origin: left center;
      opacity: 0.88;
    }

    .chart-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid #111722;
      box-shadow: 0 0 0 2px rgba(108, 140, 255, 0.18);
    }

    .chart-foot {
      display: flex;
      justify-content: space-between;
      color: var(--text-disabled);
      font-size: 11px;
      font-weight: 700;
    }

    .timeline {
      display: grid;
      gap: 0;
      border: 1px solid #263040;
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-card-secondary);
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr);
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-card);
    }

    .timeline-item:last-child { border-bottom: 0; }
    .timeline-date { color: #DCE7FF; font-weight: 850; }
    .timeline-text { margin: 0; color: #D1D5DB; line-height: 1.55; }

    .path-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .path-node {
      position: relative;
      padding: 14px;
      border-radius: 14px;
      background: var(--bg-card-secondary);
      border: 1px solid #263040;
      min-height: 110px;
    }

    .path-node::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -10px;
      width: 10px;
      height: 1px;
      background: var(--border-card);
    }

    .path-node:last-child::after { display: none; }
    .path-node strong { display: block; margin-bottom: 8px; color: #DCE7FF; }
    .path-node p { margin: 0; color: var(--text-secondary); line-height: 1.5; }

    .pathway-list {
      display: grid;
      gap: 18px;
    }

    .pathway-block {
      scroll-margin-top: 120px;
      display: grid;
      gap: 16px;
      padding: 18px;
      border-radius: 16px;
      background: var(--bg-card-secondary);
      border: 1px solid #263040;
    }

    .pathway-block > header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-card);
    }

    .pathway-label {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
    }

    .pathway-block h3 {
      margin-top: 4px;
      font-size: 18px;
    }

    .pathway-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .pathway-panel {
      display: grid;
      gap: 8px;
      min-width: 0;
      padding: 14px;
      border-radius: 13px;
      border: 1px solid rgba(40, 47, 59, 0.85);
      background: rgba(14, 17, 23, 0.34);
    }

    .pathway-panel.full { grid-column: 1 / -1; }

    .pathway-panel h4 {
      margin: 0;
      color: #E5E7EB;
      font-size: 14px;
      line-height: 1.4;
    }

    .pathway-panel p {
      margin: 0;
      color: #D1D5DB;
      line-height: 1.7;
      word-break: keep-all;
    }

    .flow-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 4px 0;
    }

    .flow-line span {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(108, 140, 255, 0.11);
      border: 1px solid rgba(108, 140, 255, 0.22);
      color: #DCE7FF;
      font-size: 12px;
      font-weight: 750;
    }

    .flow-line b {
      color: var(--text-disabled);
      font-weight: 700;
    }

    .signal-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding-left: 18px;
      color: #D1D5DB;
      line-height: 1.65;
    }

    .relation-card,
    .scenario-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 14px;
      background: var(--bg-card-secondary);
      border: 1px solid #263040;
    }

    .relation-card h3,
    .scenario-card h3 {
      font-size: 16px;
    }

    .detail-pair {
      display: grid;
      gap: 6px;
      padding-top: 10px;
      border-top: 1px solid var(--border-card);
    }

    .detail-pair span {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
    }

    .detail-pair p {
      margin: 0;
      color: #D1D5DB;
      line-height: 1.6;
      word-break: keep-all;
    }

    .matrix {
      display: grid;
      border: 1px solid #263040;
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-card-secondary);
    }

    .matrix table {
      width: 100%;
      border-collapse: collapse;
    }

    .matrix th,
    .matrix td {
      padding: 13px 12px;
      border-bottom: 1px solid var(--border-card);
      color: #D1D5DB;
      text-align: left;
      vertical-align: top;
      line-height: 1.45;
    }

    .matrix th {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
      background: rgba(23, 28, 38, 0.84);
    }

    .matrix tr:last-child td { border-bottom: 0; }

    .source-list {
      margin: 0;
      padding-left: 18px;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .source-list a {
      color: #CFE0FF;
      text-decoration: underline;

    };

    const panels = {
      all: document.querySelector('[data-panel="all"]'),
      global: document.querySelector('[data-panel="global"]')
    };
    const tocList = document.getElementById("tocList");
    const tabs = document.querySelectorAll("[data-report]");

    function renderReport(key) {
      const report = reports[key];
      const panel = panels[key];
      panel.innerHTML = `
        <section class="card hero-card report-section" id="${key}-top">
          <span class="pill" style="width:max-content; background: var(--global-stock-soft); color:#DCE7FF;">${report.badge}</span>
          <h1>${report.title}</h1>
          <p class="hero-subtitle">${report.subtitle}</p>
        </section>
        ${key === "all" ? commonNotice : ""}
        ${report.sections.map(section => `
          <section class="card report-section" id="${section.id}">
            <h2>${section.title}</h2>
            ${section.body}
          </section>
        `).join("")}
      `;
    }

    function setReport(key, updateHash = true) {
      Object.entries(panels).forEach(([panelKey, panel]) => {
        panel.hidden = panelKey !== key;
      });
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.report === key));

      const report = reports[key];
      tocList.innerHTML = report.sections.map(section => `
        <a class="toc-link" href="#${section.id}">${section.title}</a>
      `).join("");

      if (updateHash) {
        history.replaceState(null, "", `#${key}`);
      }
      document.querySelector(".asset-tab.active")?.scrollIntoView({ inline: "center", block: "nearest" });
      requestAnimationFrame(updateActiveToc);
    }

    function updateActiveToc() {
      const visiblePanel = Object.values(panels).find(panel => !panel.hidden);
      if (!visiblePanel) return;
      const sections = [...visiblePanel.querySelectorAll(".report-section[id]")];
      let current = sections[0]?.id;
      for (const section of sections) {
        if (section.getBoundingClientRect().top < 150) current = section.id;
      }
      document.querySelectorAll(".toc-link").forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === `#${current}`);
      });
    }

    renderReport("all");
    renderReport("global");
    const initialReport = location.hash.includes("global") || new URLSearchParams(location.search).get("report") === "global" ? "global" : "all";
    setReport(initialReport, false);

    tabs.forEach(tab => tab.addEventListener("click", () => setReport(tab.dataset.report)));
    document.addEventListener("scroll", updateActiveToc, { passive: true });
  </script>
